<!doctype html>
<html>
  <head>
    <title>GoogleBeta</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="image-assignment-5.png" alt="Google" />
      </div>
    </div>
    <div class="search-box">
      <p>Search the web using Google!</p>
      <input type="text" name="search-box" />
    </div>
    <div class="button">
      <button>Google Search</button>
      <button>I'm feeling lucky</button>
    </div>
    <div class="columns">
      <div class="column-1">
        <strong>Special Searches</strong>
        <a href="http//:standfortsearch.com"> Stanford Search</a>
        <a href="linuxsearch.com">Linux Search</a>
      </div>
      <div class="column-2">
        <a href="http//:help.com">Help!</a>
        <a href="http//:aboutgoogle.com">About Google</a>
        <a href="http//:companyinfo.com">Company Info</a>
        <a href="http//:google!logos.com">Google! Logos</a>
      </div>
      <div class="column-3">
        <p>Get Google!</p>
        <p>Update Monthly</p>
        <input type="email" name="email" />
        <button>Subscribe</button>
        <a href="http//:archive.com">Archive</a>
      </div>
    </div>
    <div class="copyright">
      <p>Copyright © Google Inc.</p>
    </div>
  </body>
</html>
